<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHome Pro</title>
    <!-- Capacitor 6: bridge JS is injected automatically by BridgeActivity -->
    <!-- Iconos PWA -->
    <link rel="icon" type="image/png" href="static/icon.png">
    <link rel="apple-touch-icon" href="static/icon.png">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f14;
            --card-bg: rgba(22, 26, 36, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #8f9cae;
            --accent-cyan: #00f0ff;
            --accent-purple: #ab47bc;
            --accent-green: #39ff14;
            --accent-red: #ff3838;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Fondo Decorativo de Gradiente Difuminado (Glow effect) */
        .glow-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .glow-blob-1 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: -50px;
            left: -50px;
            border-radius: 50%;
        }

        .glow-blob-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(171, 71, 188, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: -100px;
            right: -100px;
            border-radius: 50%;
        }

        header {
            width: 100%;
            max-width: 600px;
            padding: 30px 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(45deg, #ffffff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .btn-scan {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .btn-scan:hover {
            background: var(--accent-cyan);
            color: #000;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 0 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Barra de Acciones Globales */
        .quick-actions-bar {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .btn-action-all {
            flex: 1;
            padding: 12px 16px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            backdrop-filter: blur(10px);
        }

        .btn-action-all.turn-on:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .btn-action-all.turn-off:hover {
            background: rgba(255, 56, 56, 0.1);
            border-color: var(--accent-red);
            color: var(--accent-red);
            box-shadow: 0 0 15px rgba(255, 56, 56, 0.2);
        }

        /* Tarjeta de Dispositivo */
        .device-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .device-card.online {
            border-color: rgba(0, 240, 255, 0.2);
        }

        .device-card.active-light {
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
            border-color: rgba(0, 240, 255, 0.3);
        }

        .device-card.active-plug {
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.12);
            border-color: rgba(57, 255, 20, 0.25);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .device-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .device-name {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .device-ip {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-badge.online {
            color: var(--accent-cyan);
            background: rgba(0, 240, 255, 0.1);
            border-color: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .status-badge.offline {
            color: var(--accent-red);
            background: rgba(255, 56, 56, 0.1);
            border-color: rgba(255, 56, 56, 0.2);
        }

        /* Botón de Olvidar Dispositivo */
        .btn-delete-device {
            background: rgba(255, 56, 56, 0.05);
            border: 1px solid rgba(255, 56, 56, 0.2);
            color: var(--accent-red);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-delete-device:hover {
            background: var(--accent-red);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 56, 56, 0.4);
            border-color: var(--accent-red);
        }

        /* Botón de Programación */
        .btn-schedule-device {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: var(--accent-cyan);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-schedule-device:hover {
            background: var(--accent-cyan);
            color: #000;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
            border-color: var(--accent-cyan);
        }

        /* Botón de Encendido / Apagado */
        .power-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .power-btn.on {
            background: var(--accent-cyan);
            color: #000;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .power-btn.on.plug-btn {
            background: var(--accent-green);
            color: #000;
            border-color: var(--accent-green);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }

        /* Controles de Foco (RGB & Whites) */
        .color-controls {
            display: flex;
            flex-direction: column;
            gap: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 18px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .color-picker-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Selector de Color Personalizado */
        .picker-wrapper {
            position: relative;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .picker-wrapper input[type="color"] {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 80px;
            height: 80px;
            cursor: pointer;
            border: none;
            background: none;
        }

        .btn-save-color {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-save-color:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Lista de Colores Favoritos */
        .saved-colors-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .color-bubble {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            border: 2px solid transparent;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .color-bubble:hover {
            transform: scale(1.1);
            border-color: #fff;
        }

        .color-bubble .delete-color-btn {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 14px;
            height: 14px;
            background: #ff3838;
            color: #fff;
            font-size: 9px;
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            border: 1px solid #000;
        }

        .color-bubble:hover .delete-color-btn {
            display: flex;
        }

        /* Sliders de Luz Blanca */
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .slider-input {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }

        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-cyan);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            transition: transform 0.1s ease;
        }

        .slider-input::-webkit-slider-thumb:active {
            transform: scale(1.3);
        }

        /* --- Estilos del Drawer de Programaciones --- */
        .schedule-drawer {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 18px;
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .days-pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .days-pills label {
            cursor: pointer;
        }

        .days-pills input {
            display: none;
        }

        .days-pills span {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .days-pills input:checked+span {
            background: var(--accent-cyan);
            color: #000;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        /* Switch Toggle para Programaciones */
        .switch-container {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 20px;
        }

        .switch-container input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            transition: .3s;
        }

        .switch-slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: .3s;
        }

        .switch-container input:checked+.switch-slider {
            background-color: var(--accent-cyan);
        }

        .switch-container input:checked+.switch-slider:before {
            transform: translateX(18px);
            background-color: #000;
        }

        /* Ventanas Modales */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #121620;
            border: 1px solid var(--card-border);
            width: 100%;
            max-width: 450px;
            border-radius: 28px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        /* Campos de formulario */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 12px 16px;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            width: 100%;
        }

        .form-group input:focus {
            border-color: var(--accent-cyan);
        }

        .btn-submit {
            background: var(--accent-cyan);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-submit:hover {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        /* Lista de Dispositivos Escaneados */
        .scan-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 250px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .scan-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .scan-card-name {
            font-size: 15px;
            font-weight: 600;
        }

        .scan-card-ip {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .scan-card-btn {
            background: var(--accent-cyan);
            border: none;
            color: #000;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .scan-card-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid var(--accent-cyan);
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner-container {
            text-align: center;
            padding: 20px 0;
        }
    </style>
</head>

<body>

    <div class="glow-bg">
        <div class="glow-blob-1"></div>
        <div class="glow-blob-2"></div>
    </div>

    <header>
        <h1>SmartHome Pro</h1>
        <button class="btn-scan" onclick="abrirModalEscanear()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            Escanear
        </button>
    </header>

    <div class="container">
        <!-- Acciones Rápidas Globales -->
        <div class="quick-actions-bar">
            <button class="btn-action-all turn-on" onclick="controlGlobal(true)">Encender Todo</button>
            <button class="btn-action-all turn-off" onclick="controlGlobal(false)">Apagar Todo</button>
        </div>

        <div id="devices-container" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
            <!-- Tarjetas dinámicas se inyectarán aquí -->
            <div style="text-align: center; color: var(--text-secondary); padding: 40px 0;">
                Cargando dispositivos...
            </div>
        </div>
    </div>

    <!-- MODAL DE ESCANEO -->
    <div class="modal" id="modal-escanear">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">Buscando Dispositivos</span>
                <button class="modal-close" onclick="cerrarModalEscanear()">×</button>
            </div>
            <button class="btn-submit" id="scan-btn" onclick="escanearDispositivos()">Escanear Red</button>
            <div id="scan-results" class="scan-list">
                <!-- Resultados del escaneo UDP -->
            </div>
        </div>
    </div>

    <!-- MODAL DE GUARDAR COLOR -->
    <div class="modal" id="modal-guardar-color">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">Guardar Color Favorito</span>
                <button class="modal-close" onclick="cerrarModalGuardarColor()">×</button>
            </div>

            <div class="form-group">
                <label for="color-name-input">Nombre del Color</label>
                <input type="text" id="color-name-input" placeholder="Ej. Azul Relajante">
            </div>

            <button class="btn-submit" onclick="confirmarGuardarColor()">Guardar Color</button>
        </div>
    </div>

    <!-- MODAL DE REGISTRO DE DISPOSITIVO -->
    <div class="modal" id="modal-registrar-dispositivo">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">Registrar Dispositivo</span>
                <button class="modal-close" onclick="cerrarModalRegistrar()">×</button>
            </div>

            <div class="form-group">
                <label for="reg-ip">IP del Dispositivo</label>
                <input type="text" id="reg-ip" readonly>
            </div>

            <div class="form-group">
                <label for="reg-nombre">Nombre Descriptivo</label>
                <input type="text" id="reg-nombre" placeholder="Ej. Foco Cuarto">
            </div>

            <div class="form-group">
                <label for="reg-tipo">Tipo</label>
                <select id="reg-tipo">
                    <option value="foco">Foco (Bulb RGBCW)</option>
                    <option value="enchufe">Enchufe (Smart Plug)</option>
                </select>
            </div>

            <button class="btn-submit" onclick="confirmarRegistroDispositivo()">Guardar en Red</button>
        </div>
    </div>

    <script>
        let dispositivos = [];
        let coloresFavoritos = [];
        let programaciones = [];
        let colorSeleccionadoRgb = { r: 255, g: 255, b: 255 };
        let messageCounter = 0;
        let ipColorPendiente = "";

        // --- Utilidades de Red y Protocolo Surplife (25-byte) ---

        function calculateChecksum(bytes) {
            let sum = 0;
            for (let i = 0; i < bytes.length; i++) {
                sum += bytes[i];
            }
            return sum & 0xFF;
        }

        function getNextCounter() {
            messageCounter = (messageCounter + 1) % 256;
            return messageCounter;
        }

        // Convierte RGB a HSV igual que Python colorsys
        function rgbToHsv(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, v = max;
            let d = max - min;
            s = max === 0 ? 0 : d / max;
            if (max === min) {
                h = 0;
            } else {
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return {
                h: Math.round(h * 360),
                s: Math.round(s * 100),
                v: Math.round(v * 100)
            };
        }

        // Genera la trama de bytes para el protocolo de 25 bytes
        function construct25ByteMessage(writeMode, h, s, v, temp, brightness) {
            const inner = [
                0xE0, 0x01, 0x00, writeMode,
                h, s, v,
                temp, brightness,
                0x00, 0x00, 0x14, 0x00, 0x00
            ];
            const outer = [
                0xB0, 0xB1, 0xB2, 0xB3, 0x00, 0x01,
                0x02,
                getNextCounter(),
                0x00, 0x0E,
                ...inner
            ];
            const csum = calculateChecksum(outer);
            outer.push(csum);
            return outer;
        }

        function getDispositivosLocal() {
            const data = localStorage.getItem('dispositivos');

        // --- Inicialización ---

        async function waitForCapacitorBridge(maxWaitMs = 3000) {
            const start = Date.now();
            while (!window.Capacitor && (Date.now() - start) < maxWaitMs) {
                await new Promise(r => setTimeout(r, 100));
            }
            if (window.Capacitor) {
                console.log("Capacitor Bridge detectado correctamente.");
            } else {
                console.warn("Capacitor Bridge no disponible después de " + maxWaitMs + "ms.");
            }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            // Renderizar inmediatamente con datos locales
            obtenerDispositivos();
            obtenerColoresFavoritos();
            obtenerProgramaciones();

            // Esperar a que el bridge nativo esté listo antes del polling
            await waitForCapacitorBridge();

            // Consultar estados reales ahora que el bridge está disponible
            actualizarEstadosDispositivos();

            // Polling de estados locales cada 4 segundos
            setInterval(obtenerDispositivosSilencioso, 4000);
        });

        // Cargar y consultar estado inicial de dispositivos
        async function obtenerDispositivos() {
            dispositivos = getDispositivosLocal();
            renderizarDispositivos();
            actualizarEstadosDispositivos();
        }

        // Consulta en paralelo el estado real de los dispositivos registrados
        async function actualizarEstadosDispositivos() {
            if (!window.Capacitor || !Capacitor.Plugins.SocketBridge) return;
            const promesas = dispositivos.map(async (dev) => {
                try {
                    const status = await Capacitor.Plugins.SocketBridge.checkDeviceStatus({ ip: dev.ip });
                    dev.online = status.online;
                    dev.encendido = status.encendido;
                } catch (err) {
                    dev.online = false;
                    dev.encendido = false;
                }
            });
            await Promise.all(promesas);
            renderizarDispositivos();
        }

        // Polling silencioso para refrescar estados sin redibujar DOM
        async function obtenerDispositivosSilencioso() {
            if (!window.Capacitor || !Capacitor.Plugins.SocketBridge) return;
            
            const promesas = dispositivos.map(async (dev) => {
                try {
                    const status = await Capacitor.Plugins.SocketBridge.checkDeviceStatus({ ip: dev.ip });
                    dev.online = status.online;
                    dev.encendido = status.encendido;
                } catch (err) {
                    dev.online = false;
                    dev.encendido = false;
                }
            });
            await Promise.all(promesas);

            dispositivos.forEach(dev => {
                const card = document.querySelector(`[data-ip="${dev.ip}"]`);
                if (card) {
                    const badge = card.querySelector(".status-badge");
                    if (badge) {
                        badge.className = `status-badge ${dev.online ? 'online' : 'offline'}`;
                        badge.innerText = dev.online ? 'ONLINE' : 'OFFLINE';
                    }

                    let activeClass = "";
                    if (dev.online && dev.encendido) {
                        activeClass = dev.tipo === "foco" ? "active-light" : "active-plug";
                    }
                    card.classList.remove("active-light", "active-plug", "online");
                    if (dev.online) card.classList.add("online");
                    if (activeClass) card.classList.add(activeClass);

                    const powerBtn = card.querySelector(".power-btn");
                    if (powerBtn) {
                        if (!dev.online) {
                            powerBtn.setAttribute("disabled", "true");
                        } else {
                            powerBtn.removeAttribute("disabled");
                        }

                        if (dev.online && dev.encendido) {
                            powerBtn.classList.add("on");
                            powerBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg> Apagar`;

                        }
                    }
                }
            });
        }

        // --- Lógica del Programador Nativo ---

        function alternarSeccionProgramacion(ip) {
            const drawerId = `schedule-drawer-${ip.replace(/\./g, '-')}`;
            const drawer = document.getElementById(drawerId);
            if (!drawer) return;

            if (drawer.style.display === "none" || drawer.style.display === "") {
                drawer.style.display = "flex";
                renderizarProgramacionesDeDispositivo(ip);
            } else {
                drawer.style.display = "none";
            }
        }

        function renderizarProgramacionesDeDispositivo(ip) {
            const listId = `schedule-list-${ip.replace(/\./g, '-')}`;
            const container = document.getElementById(listId);
            if (!container) return;

            container.innerHTML = "";
            const filtradas = programaciones.filter(p => p.ip === ip);

            if (filtradas.length === 0) {
                container.innerHTML = `<p style="font-size: 13px; color: var(--text-secondary); text-align: center; padding: 10px 0;">Sin tareas programadas.</p>`;
                return;
            }

            filtradas.forEach(p => {
                const item = document.createElement("div");
                item.style = "display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 12px; padding: 10px 14px; margin-bottom: 2px;";

                const diasStr = p.dias.includes("Diario") || p.dias.length === 7 ? "Diario" : p.dias.map(d => d.slice(0, 2)).join(", ");

                item.innerHTML = `
                    <div style="display: flex; flex-direction: column; gap: 2px;">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span style="font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; background: ${p.accion === 'encender' ? 'rgba(0, 240, 255, 0.1)' : 'rgba(255, 56, 56, 0.1)'}; color: ${p.accion === 'encender' ? 'var(--accent-cyan)' : 'var(--accent-red)'}; text-transform: uppercase;">${p.accion === 'encender' ? 'ON' : 'OFF'}</span>
                            <span style="font-size: 16px; font-weight: 700;">${p.hora}</span>
                        </div>
                        <span style="font-size: 11px; color: var(--text-secondary);">${diasStr}</span>
                    </div>
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <label class="switch-container">
                            <input type="checkbox" ${p.activo ? 'checked' : ''} onchange="toggleProgramacion('${p.id}', this)">
                            <span class="switch-slider"></span>
                        </label>
                        <button onclick="eliminarProgramacion('${p.id}')" style="background: none; border: none; color: var(--accent-red); cursor: pointer; font-size: 18px; width: 24px; height: 24px; display: flex; justify-content: center; align-items: center;">×</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        async function guardarNuevaProgramacion(ip) {
            const drawerId = `schedule-drawer-${ip.replace(/\./g, '-')}`;
            const drawer = document.getElementById(drawerId);
            const timeVal = drawer.querySelector(".sch-time-input").value;
            const actionVal = drawer.querySelector(".sch-action-input").value;

            const checkedBoxes = drawer.querySelectorAll(".days-pills input:checked");
            let dias = Array.from(checkedBoxes).map(cb => cb.value);

            if (!timeVal) {
                alert("Por favor, selecciona una hora.");
                return;
            }

            if (dias.length === 0) {
                dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
            }

            const id = "prog_" + Date.now();
            const [h, m] = timeVal.split(":").map(Number);

            const progs = getProgramacionesLocal();
            const nueva = {
                id,
                ip,
                hora: timeVal,
                accion: actionVal,
                dias,
                activo: true
            };
            progs.push(nueva);
            saveProgramacionesLocal(progs);

            // Registrar alarma en Android
            if (window.Capacitor && Capacitor.Plugins.SocketBridge) {
                try {
                    await Capacitor.Plugins.SocketBridge.setAlarm({
                        id,
                        ip,
                        action: actionVal,
                        hour: h,
                        minute: m,
                        days: dias
                    });
                } catch (err) {
                    console.error("Error setting native alarm:", err);
                }
            }

            // Limpiar formulario y renderizar
            drawer.querySelector(".sch-time-input").value = "";
            drawer.querySelectorAll(".days-pills input:checked").forEach(cb => cb.checked = false);

            obtenerProgramaciones();
            renderizarProgramacionesDeDispositivo(ip);
        }

        async function toggleProgramacion(id, checkbox) {
            const progs = getProgramacionesLocal();
            const p = progs.find(item => item.id === id);
            if (!p) return;

            p.activo = checkbox.checked;
            saveProgramacionesLocal(progs);

            if (window.Capacitor && Capacitor.Plugins.SocketBridge) {
                try {
                    if (p.activo) {
                        const [h, m] = p.hora.split(":").map(Number);
                        await Capacitor.Plugins.SocketBridge.setAlarm({
                            id: p.id,
                            ip: p.ip,
                            action: p.accion,
                            hour: h,
                            minute: m,
                            days: p.dias
                        });
                    } else {
                        await Capacitor.Plugins.SocketBridge.cancelAlarm({ id: p.id });
                    }
                } catch (err) {
                    console.error("Error toggling alarm:", err);
                }
            }
            obtenerProgramaciones();
        }

        async function eliminarProgramacion(id) {
            if (!confirm("¿Deseas eliminar esta tarea programada?")) return;

            let progs = getProgramacionesLocal();
            const p = progs.find(item => item.id === id);
            if (!p) return;

            progs = progs.filter(item => item.id !== id);
            saveProgramacionesLocal(progs);

            if (window.Capacitor && Capacitor.Plugins.SocketBridge) {
                try {
                    await Capacitor.Plugins.SocketBridge.cancelAlarm({ id });
                } catch (err) {
                    console.error("Error cancelling alarm:", err);
                }
            }

            obtenerProgramaciones();
        }

        // --- Control de Dispositivos (TCP Sockets) ---

        // Alternar encendido/apagado de un dispositivo individual
        async function alternarEncendido(ip, estadoActual) {
            const nuevoEstado = !estadoActual;
            const commandBytes = nuevoEstado 
                ? [0x71, 0x23, 0x0F, 0xA3] // ON
                : [0x71, 0x24, 0x0F, 0xA4]; // OFF

            if (window.Capacitor && Capacitor.Plugins.SocketBridge) {
                try {
                    await Capacitor.Plugins.SocketBridge.sendTcpCommand({ ip, bytes: commandBytes });
                    const dev = dispositivos.find(d => d.ip === ip);
                    if (dev) dev.encendido = nuevoEstado;
                    renderizarDispositivos();
                } catch (err) {
                    alert("Error de conexión con el dispositivo");
                }
            }
        }

        // Control Global (ON/OFF para todos)
        async function controlGlobal(encender) {
            const commandBytes = encender 
                ? [0x71, 0x23, 0x0F, 0xA3] 
                : [0x71, 0x24, 0x0F, 0xA4];

            const onlineDevices = dispositivos.filter(d => d.online);
            if (onlineDevices.length === 0) return;

            if (window.Capacitor && Capacitor.Plugins.SocketBridge) {
                const promesas = onlineDevices.map(async (dev) => {
                    try {
                        await Capacitor.Plugins.SocketBridge.sendTcpCommand({ ip: dev.ip, bytes: commandBytes });
                        dev.encendido = encender;
                    } catch (err) {}
                });
                await Promise.all(promesas);
                renderizarDispositivos();
            }
        }

        // Cambiar color RGB
        async function cambiarColor(ip, r, g, b) {
            const hsv = rgbToHsv(r, g, b);
            const hByte = Math.round(hsv.h / 2);
            const sByte = hsv.s;
            const vByte = hsv.v;

            // writeMode = 0xA1 para control de color (COLORS)
            const commandBytes = construct25ByteMessage(0xA1, hByte, sByte, vByte, 0, 0);

            if (window.Capacitor && Capacitor.Plugins.SocketBridge) {
                try {
                    await Capacitor.Plugins.SocketBridge.sendTcpCommand({ ip, bytes: commandBytes });
                } catch (err) {
                    console.error("Error al enviar color:", err);
                }
            }
        }

        // Throttle para el picker de color (150ms)
        let colorTimer = null;
        function throttleControlColor(ip, hexColor) {
            const r = parseInt(hexColor.slice(1, 3), 16);
            const g = parseInt(hexColor.slice(3, 5), 16);
            const b = parseInt(hexColor.slice(5, 7), 16);
            colorSeleccionadoRgb = { r, g, b };

            if (colorTimer) return;
            colorTimer = setTimeout(() => {
                cambiarColor(ip, r, g, b);
                colorTimer = null;
            }, 150);
        }

        // Cambiar blancos
        async function cambiarBlanco(ip, calidez, intensidad) {
            const card = document.querySelector(`[data-ip="${ip}"]`);
            if (!card) return;

            // Leer los valores actuales de los sliders
            const sliders = card.querySelectorAll(".slider-input");
            const calidezVal = calidez !== null ? Number(calidez) : Number(sliders[0].value);
            const intensidadVal = intensidad !== null ? Number(intensidad) : Number(sliders[1].value);

            // Mapear calidez (0=frío total, 100=cálido total)
            // En el foco: warm_white vs cool_white
            // Total white = intensidad * 2.55 (escalado a 255)
            const totalWhite = Math.round(intensidadVal * 2.55);
            const warmRatio = calidezVal / 100;
            const coolRatio = 1 - warmRatio;

            const warmWhite = Math.round(totalWhite * warmRatio);
            const coolWhite = Math.round(totalWhite * coolRatio);

            const total = warmWhite + coolWhite;
            let whiteTemp = 0;
            let whiteBrightness = 0;
            if (total > 0) {
                whiteTemp = Math.round((coolWhite / total) * 100);
                const clampedSum = Math.min(total, 255);
                whiteBrightness = Math.round((clampedSum / 255) * 100);
            }

            // writeMode = 0xB1 para control de blancos (WHITES)
            const commandBytes = construct25ByteMessage(0xB1, 0, 0, 0, whiteTemp, whiteBrightness);

            if (window.Capacitor && Capacitor.Plugins.SocketBridge) {
                try {
                    await Capacitor.Plugins.SocketBridge.sendTcpCommand({ ip, bytes: commandBytes });
                } catch (err) {
                    console.error("Error al enviar blancos:", err);
                }
            }
        }

        // --- Administración de Colores Favoritos ---

        function renderizarColoresFavoritosDeFoco(ip) {
            const gridId = `colors-grid-${ip.replace(/\./g, '-')}`;
            const grid = document.getElementById(gridId);
            if (!grid) return;

            grid.innerHTML = "";
            coloresFavoritos.forEach(col => {
                const bubble = document.createElement("div");
                bubble.className = "color-bubble";
                bubble.style.backgroundColor = `rgb(${col.r}, ${col.g}, ${col.b})`;
                bubble.title = col.nombre;
                bubble.onclick = () => cambiarColor(ip, col.r, col.g, col.b);

                const deleteBtn = document.createElement("div");
                deleteBtn.className = "delete-color-btn";
                deleteBtn.innerText = "×";
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    eliminarColor(col.nombre);
                };

                bubble.appendChild(deleteBtn);
                grid.appendChild(bubble);
            });
        }

        function renderizarColoresFavoritosEnFocos() {
            dispositivos.forEach(dev => {
                if (dev.online && dev.tipo === "foco") {
                    renderizarColoresFavoritosDeFoco(dev.ip);
                }
            });
        }

        function abrirModalGuardarColor(ip) {
            ipColorPendiente = ip;
            document.getElementById("modal-guardar-color").style.display = "flex";
            document.getElementById("color-name-input").value = "";
        }

        function cerrarModalGuardarColor() {
            document.getElementById("modal-guardar-color").style.display = "none";
        }

        function confirmarGuardarColor() {
            const nombre = document.getElementById("color-name-input").value.trim();
            if (!nombre) {
                alert("Introduce un nombre.");
                return;
            }

            const colores = getColoresLocal();
            colores.push({
                nombre,
                r: colorSeleccionadoRgb.r,
                g: colorSeleccionadoRgb.g,
                b: colorSeleccionadoRgb.b
            });
            saveColoresLocal(colores);
            cerrarModalGuardarColor();
            obtenerColoresFavoritos();
        }

        function eliminarColor(nombre) {
            let colores = getColoresLocal();
            colores = colores.filter(c => c.nombre !== nombre);
            saveColoresLocal(colores);
            obtenerColoresFavoritos();
        }

        // --- Administración de Dispositivos (Escanear / Agregar / Eliminar) ---

        function abrirModalEscanear() {
            document.getElementById("modal-escanear").style.display = "flex";
            document.getElementById("scan-results").innerHTML = `
                <div style="text-align: center; padding: 20px 0; color: var(--text-secondary); font-size: 14px;">
                    Presiona el botón para buscar dispositivos en tu red local.
                </div>
            `;
        }

        function cerrarModalEscanear() {
            document.getElementById("modal-escanear").style.display = "none";
        }

        async function escanearDispositivos() {
            const btn = document.getElementById("scan-btn");
            btn.disabled = true;
            btn.innerText = "Escaneando...";

            const resultsContainer = document.getElementById("scan-results");
            resultsContainer.innerHTML = `
                <div class="spinner-container">
                    <div class="loader"></div>
                    <p style="color: var(--text-secondary); font-size: 14px;">Enviando señal de búsqueda...</p>
                </div>
            `;

            // Esperar a que el bridge esté disponible
            await waitForCapacitorBridge(2000);

            if (window.Capacitor && Capacitor.Plugins.SocketBridge) {
                try {
                    const res = await Capacitor.Plugins.SocketBridge.scanNetwork({ timeout: 2500 });
                    const list = res.devices || [];

                    resultsContainer.innerHTML = "";

                    if (list.length === 0) {
                        resultsContainer.innerHTML = `
                            <div style="text-align: center; padding: 20px 0; color: var(--text-secondary); font-size: 14px;">
                                No se encontraron nuevos dispositivos. Verifica tu conexión WiFi.
                            </div>
                        `;
                    } else {
                        list.forEach(dev => {
                            const yaRegistrado = dispositivos.some(d => d.ip === dev.ip);
                            const card = document.createElement("div");
                            card.className = "scan-card";
                            card.innerHTML = `
                                <div>
                                    <div class="scan-card-name">${dev.model}</div>
                                    <div class="scan-card-ip">${dev.ip} <span style="opacity:0.5;">(${dev.mac})</span></div>
                                </div>
                                <div style="display: flex; gap: 6px; align-items: center;">
                                    <button class="scan-card-btn" style="background: rgba(171, 71, 188, 0.15); color: var(--accent-purple); border: 1px solid rgba(171, 71, 188, 0.3);"
                                            onclick="probarDispositivo('${dev.ip}', this)">
                                        💡 Probar
                                    </button>
                                    <button class="scan-card-btn" 
                                            onclick="abrirModalRegistrar('${dev.ip}')" 
                                            ${yaRegistrado ? 'disabled' : ''}>
                                        ${yaRegistrado ? 'Agregado' : 'Añadir'}
                                    </button>
                                </div>
                            `;
                            resultsContainer.appendChild(card);
                        });
                    }
                } catch (err) {
                    resultsContainer.innerHTML = `
                        <div style="text-align: center; padding: 20px 0; color: var(--accent-red); font-size: 14px;">
                            Error al escanear: ${err.message || err}
                        </div>
                    `;
                } finally {
                    btn.disabled = false;
                    btn.innerText = "Escanear Red";
                }
            } else {
                resultsContainer.innerHTML = `
                    <div style="text-align: center; padding: 20px 0; color: var(--text-secondary); font-size: 14px;">
                        <p style="margin-bottom: 8px;">⚠️ Capacitor Bridge no detectado.</p>
                        <p style="font-size: 12px; opacity: 0.7;">Esta función solo está disponible desde la app nativa de Android.</p>
                    </div>
                `;
                btn.disabled = false;
                btn.innerText = "Escanear Red";
            }
        }

        // Probar/Identificar dispositivo: enciende → apaga → enciende rápidamente (flash)
        async function probarDispositivo(ip, btnElement) {
            if (!window.Capacitor || !Capacitor.Plugins.SocketBridge) return;

            const originalText = btnElement.innerText;
            btnElement.disabled = true;
            btnElement.innerText = "⚡ ...";
            btnElement.style.background = "rgba(0, 240, 255, 0.2)";
            btnElement.style.color = "var(--accent-cyan)";
            btnElement.style.borderColor = "var(--accent-cyan)";

            const ON_CMD  = [0x71, 0x23, 0x0F, 0xA3];
            const OFF_CMD = [0x71, 0x24, 0x0F, 0xA4];
            const delay = ms => new Promise(r => setTimeout(r, ms));

            try {
                // Flash secuencia: ON → espera → OFF → espera → ON → espera → OFF → espera → ON
                await Capacitor.Plugins.SocketBridge.sendTcpCommand({ ip, bytes: ON_CMD });
                await delay(400);
                await Capacitor.Plugins.SocketBridge.sendTcpCommand({ ip, bytes: OFF_CMD });
                await delay(400);
                await Capacitor.Plugins.SocketBridge.sendTcpCommand({ ip, bytes: ON_CMD });
                await delay(400);
                await Capacitor.Plugins.SocketBridge.sendTcpCommand({ ip, bytes: OFF_CMD });
                await delay(400);
                await Capacitor.Plugins.SocketBridge.sendTcpCommand({ ip, bytes: ON_CMD });
            } catch (err) {
                console.error("Error al probar dispositivo:", err);
            }

            btnElement.disabled = false;
            btnElement.innerText = originalText;
            btnElement.style.background = "rgba(171, 71, 188, 0.15)";
            btnElement.style.color = "var(--accent-purple)";
            btnElement.style.borderColor = "rgba(171, 71, 188, 0.3)";
        }

        function abrirModalRegistrar(ip) {
            document.getElementById("reg-ip").value = ip;
            document.getElementById("reg-nombre").value = "";
            document.getElementById("modal-registrar-dispositivo").style.display = "flex";
        }

        function cerrarModalRegistrar() {
            document.getElementById("modal-registrar-dispositivo").style.display = "none";
        }

        function confirmarRegistroDispositivo() {
            const ip = document.getElementById("reg-ip").value;
            const nombre = document.getElementById("reg-nombre").value.trim();
            const tipo = document.getElementById("reg-tipo").value;

            if (!nombre) {
                alert("Asigna un nombre descriptivo.");
                return;
            }

            const devs = getDispositivosLocal();
            devs.push({ nombre, ip, tipo, online: false, encendido: false });
            saveDispositivosLocal(devs);

            cerrarModalRegistrar();
            cerrarModalEscanear();
            obtenerDispositivos();
        }

        async function confirmarEliminarDispositivo(ip, nombre) {
            const confirmar = confirm(`¿Estás seguro de que deseas olvidar "${nombre}"?\nSe eliminarán sus tareas programadas.`);
            if (!confirmar) return;

            // Filtrar lista
            let devs = getDispositivosLocal();
            devs = devs.filter(d => d.ip !== ip);
            saveDispositivosLocal(devs);

            // Eliminar y cancelar programaciones asociadas en Android
            let progs = getProgramacionesLocal();
            const asociadas = progs.filter(p => p.ip === ip);
            if (window.Capacitor && Capacitor.Plugins.SocketBridge) {
                for (let p of asociadas) {
                    try {
                        await Capacitor.Plugins.SocketBridge.cancelAlarm({ id: p.id });
                    } catch (err) {}
                }
            }
            progs = progs.filter(p => p.ip !== ip);
            saveProgramacionesLocal(progs);

            obtenerDispositivos();
            obtenerProgramaciones();
        }
    </script>
</body>
