name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: |
          package.json
          SmartHomePro-Android/package.json

    - name: Build Web Assets & Capacitor Sync
      run: |
        if [ -d "SmartHomePro-Android" ]; then
          cd SmartHomePro-Android
        fi
        npm install
        npx cap sync android

    - name: Build Android Debug APK
      run: |
        if [ -d "SmartHomePro-Android" ]; then
          cd SmartHomePro-Android/android
        else
          cd android
        fi
        sed -i 's/\r$//' gradlew
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SmartHomePro-Debug-APK
        path: |
          **/app-debug.apk
          **/app-release-unsigned.apk
        retention-days: 7
